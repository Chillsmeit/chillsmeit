<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1180 610" width="1180" height="610" role="img"
     aria-label="Chillsmeit — developer profile hero banner (light)" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Chillsmeit — Developer Profile Hero (Light)</title>
  <desc>Animated glassmorphism hero banner with an ASCII portrait generated from the GitHub avatar.</desc>

  <!-- CUSTOMISE: search for the tags NAME, TYPING PHRASES, INFO ROWS, SKILL PILLS and SOCIAL. -->

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>

    <linearGradient id="asciiGrad" gradientUnits="userSpaceOnUse" x1="48" y1="88" x2="230" y2="470" spreadMethod="repeat">
      <stop offset="0"    stop-color="#2563EB"/>
      <stop offset="0.33" stop-color="#06B6D4"/>
      <stop offset="0.66" stop-color="#10B981"/>
      <stop offset="1"    stop-color="#2563EB"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        from="0 0" to="190 190" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"><animate attributeName="stop-color" values="#2563EB;#06B6D4;#10B981;#2563EB" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="0.5" stop-color="#06B6D4"><animate attributeName="stop-color" values="#06B6D4;#10B981;#2563EB;#06B6D4" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="1" stop-color="#10B981"><animate attributeName="stop-color" values="#10B981;#2563EB;#06B6D4;#10B981" dur="8s" repeatCount="indefinite"/></stop>
    </linearGradient>

    <linearGradient id="shimmer" gradientUnits="userSpaceOnUse" x1="-400" y1="0" x2="0" y2="610" spreadMethod="repeat">
      <stop offset="0"    stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#2563EB" stop-opacity="0.7"/>
      <stop offset="0.55" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="1"    stop-color="#06B6D4" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="400 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="blobViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#2563EB" stop-opacity="0.22"/><stop offset="1" stop-color="#2563EB" stop-opacity="0"/></radialGradient>
    <radialGradient id="blobCyan" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#06B6D4" stop-opacity="0.20"/><stop offset="1" stop-color="#06B6D4" stop-opacity="0"/></radialGradient>
    <radialGradient id="blobEmerald" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#10B981" stop-opacity="0.18"/><stop offset="1" stop-color="#10B981" stop-opacity="0"/></radialGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#06B6D4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1e293b" flood-opacity="0.18"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur40"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>

    <clipPath id="cardClip"><rect x="16" y="16" width="1148" height="578" rx="28"/></clipPath>
    <clipPath id="leftClip"><rect x="16" y="16" width="436" height="578"/></clipPath>
    <clipPath id="asciiReveal"><rect x="16" y="80" width="436" height="0"><animate attributeName="height" from="0" to="456" dur="3.0s" begin="0.3s" fill="freeze" calcMode="linear"/></rect></clipPath>

    <clipPath id="clipT1"><rect x="536" y="187" height="30" width="0"><animate attributeName="width" dur="15s" repeatCount="indefinite" values="0;0;264;264;0;0" keyTimes="0;0;0.06;0.16;0.1867;1"/></rect></clipPath>
    <clipPath id="clipT2"><rect x="536" y="187" height="30" width="0"><animate attributeName="width" dur="15s" repeatCount="indefinite" values="0;0;277;277;0;0" keyTimes="0;0.2;0.26;0.36;0.3867;1"/></rect></clipPath>
    <clipPath id="clipT3"><rect x="536" y="187" height="30" width="0"><animate attributeName="width" dur="15s" repeatCount="indefinite" values="0;0;211;211;0;0" keyTimes="0;0.4;0.46;0.56;0.5867;1"/></rect></clipPath>
    <clipPath id="clipT4"><rect x="536" y="187" height="30" width="0"><animate attributeName="width" dur="15s" repeatCount="indefinite" values="0;0;277;277;0;0" keyTimes="0;0.6;0.66;0.76;0.7867;1"/></rect></clipPath>
    <clipPath id="clipT5"><rect x="536" y="187" height="30" width="0"><animate attributeName="width" dur="15s" repeatCount="indefinite" values="0;0;304;304;0;0" keyTimes="0;0.8;0.86;0.96;0.9867;1"/></rect></clipPath>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono','Fira Code','SF Mono',ui-monospace,Menlo,Consolas,monospace; }
    .cursor { animation: blink 1.05s steps(1) infinite; }
    @keyframes blink { 0%,50% { opacity: 1 } 50.01%,100% { opacity: 0 } }
    .pill { transition: transform .18s ease; transform-box: fill-box; transform-origin: center; }
    .pill:hover { transform: scale(1.08); }
    .pill:hover .pillbg { stroke-opacity: 1; filter: url(#glowStrong); }
    .pillbg { animation: pulse 3.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { stroke-opacity: .45 } 50% { stroke-opacity: .9 } }
    .social { transition: transform .18s ease; transform-box: fill-box; transform-origin: center; cursor: pointer; }
    .social:hover { transform: scale(1.18); }
    .social:hover .sglyph { fill: #2563EB; }
  </style>

  <rect x="16" y="16" width="1148" height="578" rx="28" fill="url(#panelGrad)"/>

  <g clip-path="url(#cardClip)">
    <!-- ===================== RIGHT: TERMINAL ===================== -->
    <g>
      <path d="M16 44 a28 28 0 0 1 28 -28 h1092 a28 28 0 0 1 28 28 v16 h-1148 z" fill="#eef2f7"/>
      <line x1="16" y1="60" x2="1164" y2="60" stroke="#0f172a" stroke-opacity="0.06"/>
      <circle cx="44" cy="38" r="6" fill="#ff5f56"/><circle cx="66" cy="38" r="6" fill="#ffbd2e"/><circle cx="88" cy="38" r="6" fill="#27c93f"/>
      <text x="590" y="46" text-anchor="middle" class="mono" font-size="13" fill="#94a3b8">chillsmeit@cachyos:~ — zsh</text>

      <g transform="translate(-456,-28)">
      <!-- greeting + NAME -->
      <text x="508" y="132" class="mono" font-size="18" fill="#475569">Hi <tspan font-family="'Segoe UI',sans-serif">👋</tspan>, I&#39;m</text>
      <text x="506" y="176" font-size="42" font-weight="800" fill="url(#accentText)" filter="url(#glow)">Chillsmeit</text>

      <!-- typing prompt -->
      <text x="508" y="210" class="mono" font-size="22" fill="#059669">&gt;</text>
      <!-- TYPING PHRASES -->
      <g class="mono" font-size="22" fill="#0F172A" font-weight="500">
        <g clip-path="url(#clipT1)"><text x="536" y="210">Former IT / SysAdmin</text></g>
        <g clip-path="url(#clipT2)"><text x="536" y="210">DevOps &amp; Self-Hosting</text></g>
        <g clip-path="url(#clipT3)"><text x="536" y="210">Homelab Tinkerer</text></g>
        <g clip-path="url(#clipT4)"><text x="536" y="210">Open-Source &amp; Privacy</text></g>
        <g clip-path="url(#clipT5)"><text x="536" y="210">Fullstack Bootcamp Grad</text></g>
      </g>
      <rect class="cursor" y="188" width="12" height="26" fill="#06B6D4" x="536">
        <animate attributeName="x" dur="15s" repeatCount="indefinite"
          keyTimes="0;0.06;0.16;0.1867;0.2;0.26;0.36;0.3867;0.4;0.46;0.56;0.5867;0.6;0.66;0.76;0.7867;0.8;0.86;0.96;0.9867;1"
          values="536;800;800;536;536;813;813;536;536;747;747;536;536;813;813;536;536;840;840;536;536"/>
      </rect>

      <!-- INFO ROWS -->
      <g class="mono" font-size="15">
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.5s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" begin="0.6s" dur="0.5s" fill="freeze"/>
          <text x="508" y="256" fill="#475569"><tspan font-family="'Segoe UI',sans-serif">📍</tspan>  Location</text><text x="700" y="256" fill="#0F172A">Lisbon, Portugal</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.5s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" begin="0.85s" dur="0.5s" fill="freeze"/>
          <text x="508" y="288" fill="#475569"><tspan font-family="'Segoe UI',sans-serif">🎓</tspan>  Certified</text><text x="700" y="288" fill="#0F172A">Mechatronics Technician · Fullstack</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.5s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" begin="1.1s" dur="0.5s" fill="freeze"/>
          <text x="508" y="320" fill="#475569"><tspan font-family="'Segoe UI',sans-serif">🎯</tspan>  Current Focus</text><text x="700" y="320" fill="#0F172A">Open-Source · Linux · Privacy · Networking · Rust development</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.5s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" begin="1.35s" dur="0.5s" fill="freeze"/>
          <text x="508" y="352" fill="#475569"><tspan font-family="'Segoe UI',sans-serif">🖥️</tspan>  Self-Hosting</text><text x="700" y="352" fill="#0F172A">Proxmox · TrueNAS · PiHole · Docker · Jellyfin</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" begin="1.6s" dur="0.5s" fill="freeze"/>
          <text x="508" y="384" fill="#475569"><tspan font-family="'Segoe UI',sans-serif">🔗</tspan>  GitHub</text><text x="700" y="384" fill="#2563EB">github.com/Chillsmeit</text></g>
      </g>

      <text x="508" y="428" class="mono" font-size="13" fill="#94a3b8" letter-spacing="2">// TECH&#160;STACK</text>

      <!-- SKILL PILLS -->
      <g class="mono" font-size="13" fill="#0f172a">
        <!-- row 1 -->
        <g class="pill"><rect class="pillbg" x="508" y="442" width="64" height="32" rx="16" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB"/><text x="540" y="463" text-anchor="middle">Linux</text></g>
        <g class="pill"><rect class="pillbg" x="582" y="442" width="70" height="32" rx="16" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4"/><text x="617" y="463" text-anchor="middle">Docker</text></g>
        <g class="pill"><rect class="pillbg" x="662" y="442" width="46" height="32" rx="16" fill="#10B981" fill-opacity="0.08" stroke="#10B981"/><text x="685" y="463" text-anchor="middle">Git</text></g>
        <g class="pill"><rect class="pillbg" x="718" y="442" width="54" height="32" rx="16" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB"/><text x="745" y="463" text-anchor="middle">Bash</text></g>
        <g class="pill"><rect class="pillbg" x="782" y="442" width="46" height="32" rx="16" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4"/><text x="805" y="463" text-anchor="middle">Zsh</text></g>
        <g class="pill"><rect class="pillbg" x="838" y="442" width="72" height="32" rx="16" fill="#10B981" fill-opacity="0.08" stroke="#10B981"/><text x="874" y="463" text-anchor="middle">Neovim</text></g>
        <g class="pill"><rect class="pillbg" x="920" y="442" width="48" height="32" rx="16" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB"/><text x="944" y="463" text-anchor="middle">Zed</text></g>
        <g class="pill"><rect class="pillbg" x="978" y="442" width="70" height="32" rx="16" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4"/><text x="1013" y="463" text-anchor="middle">VSCode</text></g>
        <!-- row 2 -->
        <g class="pill"><rect class="pillbg" x="508" y="484" width="56" height="32" rx="16" fill="#10B981" fill-opacity="0.08" stroke="#10B981"/><text x="536" y="505" text-anchor="middle">Rust</text></g>
        <g class="pill"><rect class="pillbg" x="574" y="484" width="52" height="32" rx="16" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB"/><text x="600" y="505" text-anchor="middle">C++</text></g>
        <g class="pill"><rect class="pillbg" x="636" y="484" width="50" height="32" rx="16" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4"/><text x="661" y="505" text-anchor="middle">GTK</text></g>
        <g class="pill"><rect class="pillbg" x="696" y="484" width="100" height="32" rx="16" fill="#10B981" fill-opacity="0.08" stroke="#10B981"/><text x="746" y="505" text-anchor="middle">libadwaita</text></g>
        <g class="pill"><rect class="pillbg" x="806" y="484" width="98" height="32" rx="16" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB"/><text x="855" y="505" text-anchor="middle">JavaScript</text></g>
        <g class="pill"><rect class="pillbg" x="914" y="484" width="48" height="32" rx="16" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4"/><text x="938" y="505" text-anchor="middle">Lua</text></g>
        <g class="pill"><rect class="pillbg" x="972" y="484" width="56" height="32" rx="16" fill="#10B981" fill-opacity="0.08" stroke="#10B981"/><text x="1000" y="505" text-anchor="middle">HTML</text></g>
        <g class="pill"><rect class="pillbg" x="1038" y="484" width="50" height="32" rx="16" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB"/><text x="1063" y="505" text-anchor="middle">CSS</text></g>
      </g>

      <!-- SOCIAL -->
      <g>
        <a xlink:href="https://github.com/Chillsmeit" target="_blank"><g class="social" transform="translate(508 534)" filter="url(#glow)">
          <path class="sglyph" fill="#475569" transform="scale(1.4)" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </g></a>
        <a xlink:href="https://github.com/Chillsmeit" target="_blank"><text x="548" y="551" class="mono" font-size="15" fill="url(#accentText)">@Chillsmeit</text></a>
        <text x="1572" y="551" text-anchor="end" class="mono" font-size="13" fill="#94a3b8">Lisbon, PT · self-hosting since day one</text>
      </g>
      </g>
    </g>

    <rect x="16" y="16" width="1148" height="578" filter="url(#noise)" opacity="0.035"/>
    <rect x="16" y="16" width="1148" height="200" fill="url(#glass)"/>
  </g>

  <rect x="16" y="16" width="1148" height="578" rx="28" fill="none" stroke="#0f172a" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="16" y="16" width="1148" height="578" rx="28" fill="none" stroke="url(#shimmer)" stroke-width="1.5"/>
</svg>
